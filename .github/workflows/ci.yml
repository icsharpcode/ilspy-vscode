name: CI

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          fetch-depth: 0

      - name: Full Unicode check
        if: github.ref == 'refs/heads/master'
        run: buildtools/unicode-check --all

      - name: PR-based Unicode check
        if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/pull/')
        run: buildtools/unicode-check

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 #v5.2.0
        with:
          dotnet-version: 10.0.x

      - name: Check .NET Core version
        run: dotnet --version

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 #v6.0.9
        with:
          run_install: false
          package_json_file: vscode-extension/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: "22"
          cache: 'pnpm'
          cache-dependency-path: vscode-extension/pnpm-lock.yaml

      - name: Publish Backend
        run: buildtools/publish-backend

      - name: Test Backend
        run: buildtools/test-backend

      - name: Test Extension
        run: buildtools/test-extension

      - name: Build Extension
        run: buildtools/build-vsix

      - name: Archive artifacts
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #7.0.1
        with:
          name: Artifacts
          path: artifacts/*

      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" --draft --title "${GITHUB_REF#refs/tags/v}" artifacts/*.*
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
